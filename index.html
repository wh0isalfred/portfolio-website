<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Alfred Enyinna — Software Engineer building secure, scalable web applications with React, Next.js and modern tools. Based in Port Harcourt, Nigeria."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Caveat:wght@600&display=swap"
      rel="stylesheet"
    />
    <title>Alfred Enyinna — Software Engineer</title>
    <script>
      (function () {
        try {
          var t = localStorage.getItem("theme");
          if (!t) t = window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
          document.documentElement.setAttribute("data-theme", t);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
